<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Escape Room: Giải mã Alpha Corp — Web học tập Chương 3: Giá trị thặng dư trong nền kinh tế thị trường">
    <title>Escape Room: Giải mã Alpha Corp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="effects.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <!-- Particle Background -->
    <canvas id="particles"></canvas>

    <!-- Presentation Mode Toggle -->
    <button id="presentation-toggle" title="Chế độ thuyết trình"><i data-lucide="monitor"></i></button>

    <!-- Intro Screen -->
    <section id="intro-screen" class="screen">
        <!-- Rendered by app.js from INTRO_DATA -->
    </section>

    <!-- Room Screen -->
    <section id="room-screen" class="screen hidden">
        <header id="room-header">
            <!-- Progress bar + Room title — rendered by app.js -->
        </header>
        <main id="room-content">
            <!-- Cards (theory, case, question, result) — rendered by app.js -->
        </main>
    </section>

    <!-- Ending Screen -->
    <section id="ending-screen" class="screen hidden">
        <!-- Rendered by app.js from ENDING_DATA -->
    </section>

    <!-- Door Transition Overlay -->
    <div id="door-transition" class="door-transition hidden" aria-hidden="true">
        <div class="door-panel door-left"></div>
        <div class="door-panel door-right"></div>
        <div class="door-lock">
            <div class="lock-ring"><i data-lucide="unlock"></i></div>
            <div class="lock-text">ACCESS GRANTED</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="data.js"></script>
    <script src="app-state.js"></script>
    <script src="app-render.js"></script>
    <script src="app-effects.js"></script>
    <script src="app-game.js"></script>
    <script src="app.js"></script>
</body>

</html>
